name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token needed once registered at
# pypi.org/manage/project/memory-arena/settings/publishing/ with workflow
# `publish.yml` and environment `pypi` (Xavier needs to click this once;
# tracked in LAUNCH_PENDING_HUMAN_ACTIONS.md). The workflow falls back to a
# PYPI_API_TOKEN secret if Trusted Publishing isn't registered yet.
#
# How the fallback condition works: we surface the secret as a workflow-level
# env var (`PYPI_API_TOKEN`) so the per-step `if:` expression `env.PYPI_API_TOKEN`
# evaluates correctly. GitHub Actions does not allow `${{ secrets.X }}` inside
# `if:` directly in a reliable way, but it does allow `env.X` once the secret
# has been mapped to env at workflow scope.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check build artifacts
        run: twine check dist/*

      # Preferred path: PyPI Trusted Publishing via OIDC. Runs when the
      # PYPI_API_TOKEN secret is NOT set (the env var resolves to an empty
      # string when the secret is missing).
      - name: Publish via Trusted Publishing (preferred)
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1

      # Fallback path: classic API token upload. Runs when PYPI_API_TOKEN is
      # set as a repository or environment secret. Use this until Trusted
      # Publishing is registered on PyPI (see LAUNCH_PENDING_HUMAN_ACTIONS.md).
      - name: Publish via API token (fallback)
        if: env.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
